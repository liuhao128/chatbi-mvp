<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBI MVP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 24px;
        }
        /* 输入区域 */
        .input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus {
            border-color: #4a6cf7;
        }
        .input-area input:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }
        .input-area button {
            padding: 12px 24px;
            font-size: 15px;
            background: #4a6cf7;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .input-area button:hover:not(:disabled) {
            background: #3b5de7;
        }
        .input-area button:disabled {
            background: #a0b4ff;
            cursor: not-allowed;
        }
        .input-area button.cancel {
            background: #e74c3c;
        }
        .input-area button.cancel:hover {
            background: #c0392b;
        }
        /* 结果区域 */
        .result-area {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            min-height: 200px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        /* SQL 展示区 */
        .sql-box {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 16px;
            border-radius: 8px;
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 48px;
            margin-bottom: 20px;
        }
        .sql-box .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #89b4fa;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        /* 状态提示 */
        .status {
            font-size: 14px;
            color: #888;
            padding: 12px 0;
        }
        .status.thinking::before {
            content: "";
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #4a6cf7;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* 错误提示 */
        .error-card {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            border-radius: 8px;
            padding: 16px;
            color: #cf1322;
            margin-bottom: 16px;
        }
        .error-card .error-type {
            font-size: 12px;
            font-weight: 600;
            color: #ff7875;
            margin-bottom: 4px;
        }
        /* 结果表格 */
        .result-table-wrapper {
            overflow-x: auto;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .result-table th {
            background: #fafafa;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #e8e8e8;
            font-weight: 600;
            color: #555;
        }
        .result-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .result-table tr:nth-child(even) td {
            background: #fafbfc;
        }
        .row-count {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }
        /* 空状态 */
        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 48px 0;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ChatBI MVP</h1>
        <div class="input-area">
            <input
                type="text"
                id="questionInput"
                placeholder="输入业务问题，例如：上个月销售额是多少？"
                autocomplete="off"
            />
            <button id="submitBtn" onclick="submitQuery()">查询</button>
        </div>
        <div class="result-area" id="resultArea">
            <div class="empty-state" id="emptyState">
                输入问题后，SQL 和查询结果会在这里展示
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';  // 同源，不需要额外前缀
        let abortController = null;

        const questionInput = document.getElementById('questionInput');
        const submitBtn = document.getElementById('submitBtn');
        const resultArea = document.getElementById('resultArea');

        // 回车提交
        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !submitBtn.disabled) {
                submitQuery();
            }
        });

        async function submitQuery() {
            const question = questionInput.value.trim();
            if (!question) return;

            // 切换为"查询中"状态
            questionInput.disabled = true;
            submitBtn.textContent = '取消';
            submitBtn.classList.add('cancel');
            submitBtn.onclick = cancelQuery;

            // 准备结果区域
            resultArea.innerHTML = '';

            // SQL 展示区
            const sqlSection = document.createElement('div');
            sqlSection.innerHTML = '<div class="section-title">生成的 SQL</div>';
            const sqlBox = document.createElement('div');
            sqlBox.className = 'sql-box';
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'cursor';
            sqlBox.appendChild(cursorSpan);
            sqlSection.appendChild(sqlBox);
            resultArea.appendChild(sqlSection);

            // 状态行
            const statusDiv = document.createElement('div');
            statusDiv.className = 'status thinking';
            statusDiv.textContent = '正在生成 SQL...';
            resultArea.appendChild(statusDiv);

            // 结果区占位
            const resultSection = document.createElement('div');
            resultSection.style.display = 'none';
            resultArea.appendChild(resultSection);

            // SSE 请求
            abortController = new AbortController();
            let fullSql = '';

            try {
                const response = await fetch(`${API_BASE}/api/v1/query/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                    signal: abortController.signal,
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // 按 \n\n 分割 SSE 事件
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop();  // 最后一段可能不完整，留到下次

                    for (const part of parts) {
                        if (!part.trim()) continue;

                        let eventType = '';
                        let eventData = {};

                        for (const line of part.split('\n')) {
                            if (line.startsWith('event: ')) {
                                eventType = line.slice(7).trim();
                            } else if (line.startsWith('data: ')) {
                                try {
                                    eventData = JSON.parse(line.slice(6));
                                } catch (e) {
                                    console.warn('Failed to parse SSE data:', line);
                                }
                            }
                        }

                        if (!eventType) continue;

                        switch (eventType) {
                            case 'sql_chunk':
                                // 逐字拼接 SQL
                                fullSql += eventData.content || '';
                                // 更新 SQL 文本（保留光标）
                                sqlBox.textContent = fullSql;
                                sqlBox.appendChild(cursorSpan);
                                break;

                            case 'sql_done':
                                // SQL 生成完毕，移除光标
                                fullSql = eventData.sql || fullSql;
                                sqlBox.textContent = fullSql;
                                statusDiv.className = 'status thinking';
                                statusDiv.textContent = 'SQL 执行中...';
                                break;

                            case 'result':
                                // 查询结果
                                statusDiv.className = 'status';
                                statusDiv.textContent = '';
                                renderResult(resultSection, eventData);
                                break;

                            case 'error':
                                statusDiv.className = 'status';
                                statusDiv.textContent = '';
                                renderError(resultArea, eventData);
                                // 移除光标
                                if (cursorSpan.parentNode) cursorSpan.remove();
                                break;
                        }
                    }
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    statusDiv.className = 'status';
                    statusDiv.textContent = '已取消查询';
                    if (cursorSpan.parentNode) cursorSpan.remove();
                } else {
                    statusDiv.className = 'status';
                    statusDiv.textContent = '';
                    renderError(resultArea, { error: e.message, error_type: 'network' });
                    if (cursorSpan.parentNode) cursorSpan.remove();
                }
            } finally {
                resetInput();
            }
        }

        function cancelQuery() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
        }

        function resetInput() {
            questionInput.disabled = false;
            submitBtn.textContent = '查询';
            submitBtn.classList.remove('cancel');
            submitBtn.onclick = submitQuery;
            submitBtn.disabled = false;
        }

        function renderResult(container, data) {
            container.style.display = 'block';
            const { columns, rows, row_count } = data;

            let html = '<div class="section-title" style="margin-top: 16px;">查询结果</div>';
            html += '<div class="result-table-wrapper"><table class="result-table"><thead><tr>';
            for (const col of columns) {
                html += `<th>${escapeHtml(col)}</th>`;
            }
            html += '</tr></thead><tbody>';
            for (const row of rows) {
                html += '<tr>';
                for (const col of columns) {
                    html += `<td>${escapeHtml(String(row[col] ?? ''))}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table></div>';
            html += `<div class="row-count">共 ${row_count} 行</div>`;

            container.innerHTML = html;
        }

        function renderError(container, data) {
            const typeLabels = {
                'validation': '输入校验错误',
                'llm': 'LLM 调用失败',
                'database': 'SQL 执行错误',
                'network': '网络错误',
            };
            const label = typeLabels[data.error_type] || data.error_type || '未知错误';

            const errorCard = document.createElement('div');
            errorCard.className = 'error-card';
            errorCard.innerHTML = `
                <div class="error-type">${escapeHtml(label)}</div>
                <div>${escapeHtml(data.error || '未知错误')}</div>
            `;
            container.appendChild(errorCard);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
